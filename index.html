<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rajesh Dhannana — QA Automation Engineer</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0f0d0b;
      --bg2:      #171410;
      --surface:  #1e1a15;
      --surface2: #262119;
      --border:   #2e2820;
      --accent:   #e8954a;
      --accent2:  #7dd3c0;
      --gold:     #d4a843;
      --text:     #ece8e2;
      --muted:    #8a8178;
      --heading:  #faf7f3;
      --glow:     rgba(232,149,74,.12);
      --nav-h:    70px;
      --r:        12px;
      --ease:     cubic-bezier(.4,0,.2,1);
    }
    [data-theme="light"] {
      --bg:       #faf8f5;
      --bg2:      #f2ede6;
      --surface:  #ffffff;
      --surface2: #f8f4ee;
      --border:   #e0d8cc;
      --text:     #1c1915;
      --muted:    #6b635a;
      --heading:  #0f0d0b;
      --glow:     rgba(232,149,74,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.7; overflow-x: hidden;
    }
    ::selection { background: var(--accent); color: #fff; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(232,149,74,.018) 80px,rgba(232,149,74,.018) 81px);
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(18px, 5vw, 60px);
      background: rgba(15,13,11,.9);
      backdrop-filter: blur(20px) saturate(140%);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] nav { background: rgba(250,248,245,.92); }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 700; font-style: italic;
      color: var(--heading); text-decoration: none;
    }
    .nav-logo b { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 0; list-style: none; }
    .nav-links a {
      display: block; padding: 8px 16px;
      font-size: .82rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; border-radius: 6px; transition: color .2s, background .2s;
    }
    .nav-links a:hover { color: var(--accent); background: rgba(232,149,74,.08); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .theme-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; display: grid; place-items: center;
      font-size: .95rem; transition: .2s; color: var(--text);
    }
    .theme-btn:hover { border-color: var(--accent); }
    .hamburger { display: none; flex-direction: column; gap: 4px; cursor: pointer; padding: 8px; }
    .hamburger span { display: block; width: 20px; height: 2px; background: var(--text); border-radius: 2px; transition: .3s; }
    .mobile-nav {
      display: none; position: fixed; inset: 0; z-index: 99;
      background: var(--bg); padding-top: var(--nav-h);
      flex-direction: column; align-items: center; justify-content: center; gap: 36px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-style: italic; color: var(--text); text-decoration: none; transition: color .2s; }
    .mobile-nav a:hover { color: var(--accent); }
    @media (max-width: 820px) { .nav-links { display: none; } .hamburger { display: flex; } }

    /* LAYOUT */
    .wrap { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 0 clamp(18px,6vw,80px); }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: grid; grid-template-columns: 1fr 420px; gap: 60px;
      align-items: center; padding-top: var(--nav-h);
    }
    @media (max-width: 900px) { #hero { grid-template-columns: 1fr; } .hero-visual { display: none; } }

    .hero-left { padding: clamp(60px,10vw,120px) 0; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 5px 14px 5px 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; margin-bottom: 32px;
      font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--accent); animation: sli .7s var(--ease) both;
    }
    .hero-eyebrow .chip { padding: 3px 10px; border-radius: 999px; background: var(--accent); color: #fff; font-size: .7rem; }
    .dp { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: bl 2s ease-in-out infinite; }
    @keyframes bl { 0%,100%{opacity:1}50%{opacity:.2} }
    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem,7vw,5.8rem); font-weight: 700; color: var(--heading);
      line-height: 1.0; letter-spacing: -.02em; margin-bottom: 6px;
      animation: sli .8s .1s var(--ease) both;
    }
    .hero-name i { color: var(--accent); font-style: italic; }
    .hero-title-bar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
      animation: sli .8s .18s var(--ease) both;
    }
    .hero-title-bar span { font-size: clamp(.95rem,2vw,1.15rem); color: var(--muted); font-weight: 400; }
    .dd { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .hero-desc { font-size: 1.05rem; color: var(--text); max-width: 520px; line-height: 1.8; margin-bottom: 40px; animation: sli .8s .25s var(--ease) both; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 52px; animation: sli .8s .32s var(--ease) both; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 26px; border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: .9rem;
      text-decoration: none; cursor: pointer; border: none; transition: .25s var(--ease);
    }
    .btn-fill { background: var(--accent); color: #fff; }
    .btn-fill:hover { background: #d4813a; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,149,74,.35); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .hero-stats { display: flex; gap: 36px; flex-wrap: wrap; animation: sli .8s .38s var(--ease) both; }
    .hstat { border-left: 2px solid var(--border); padding-left: 16px; }
    .hstat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--heading); line-height: 1; display: block; }
    .hstat-label { font-size: .75rem; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }

    /* hero card */
    .hero-visual { animation: sli .9s .2s var(--ease) both; position: relative; }
    .float-orb { position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: -1; }
    .orb1 { width:300px;height:300px; background:rgba(232,149,74,.12); top:-80px; left:-80px; }
    .orb2 { width:200px;height:200px; background:rgba(125,211,192,.08); bottom:-40px; right:-40px; }
    .hero-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px 32px;
      position: relative; overflow: hidden;
    }
    .hero-card::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,149,74,.2) 0%, transparent 70%);
    }
    .hc-avatar {
      width: 80px; height: 80px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: grid; place-items: center;
      font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: #fff;
      margin-bottom: 20px;
    }
    .hc-name { font-weight: 700; font-size: 1.1rem; color: var(--heading); margin-bottom: 4px; }
    .hc-role { font-size: .85rem; color: var(--accent); font-weight: 600; margin-bottom: 24px; }
    .hc-items { display: flex; flex-direction: column; gap: 12px; }
    .hc-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border); font-size: .85rem; color: var(--text);
    }
    .hc-badge {
      margin-left: auto; padding: 2px 8px; border-radius: 999px;
      background: rgba(125,211,192,.15); border: 1px solid rgba(125,211,192,.3);
      font-size: .68rem; color: var(--accent2); font-weight: 600;
    }
    @keyframes sli { from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)} }

    /* SECTIONS */
    .section { position: relative; z-index: 1; padding: clamp(72px,10vw,120px) 0; }
    .section-alt { background: var(--bg2); }
    .section-alt .wrap { padding-top: clamp(72px,10vw,120px); padding-bottom: clamp(72px,10vw,120px); }
    .sec-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: .72rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px;
    }
    .sec-tag::before { content: ''; display: block; width: 20px; height: 2px; background: var(--accent); border-radius: 1px; }
    h2.sec-h {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem,4.5vw,3.2rem); font-weight: 700; color: var(--heading);
      line-height: 1.1; margin-bottom: 14px;
    }
    h2.sec-h i { color: var(--accent); font-style: italic; }
    .sec-sub { color: var(--muted); font-size: 1rem; max-width: 520px; margin-bottom: 56px; }

    /* ABOUT */
    .about-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 64px; align-items: start; }
    @media (max-width: 820px) { .about-layout { grid-template-columns: 1fr; } }
    .about-text p { margin-bottom: 18px; font-size: 1rem; line-height: 1.8; }
    .info-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 28px; }
    .info-list li a, .info-list li .info-span {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); text-decoration: none; font-size: .9rem; transition: color .2s;
    }
    .info-list li a:hover { color: var(--accent); }
    .info-ico { width: 34px; height: 34px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); display: grid; place-items: center; font-size: .9rem; flex-shrink: 0; }
    .feature-list { display: flex; flex-direction: column; gap: 14px; }
    .feature-item {
      display: grid; grid-template-columns: 52px 1fr; gap: 18px; align-items: center;
      padding: 18px 20px; border-radius: var(--r);
      background: var(--surface); border: 1px solid var(--border); transition: .25s var(--ease);
    }
    .feature-item:hover { border-color: var(--accent); transform: translateX(5px); }
    .fi-icon { width: 52px; height: 52px; border-radius: 10px; background: var(--surface2); display: grid; place-items: center; font-size: 1.4rem; }
    .feature-item h4 { font-weight: 700; color: var(--heading); font-size: .95rem; margin-bottom: 3px; }
    .feature-item p { font-size: .83rem; color: var(--muted); line-height: 1.5; }

    /* SKILLS */
    .skills-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 18px; }
    .sk-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 26px 22px;
      transition: .25s var(--ease); position: relative; overflow: hidden;
    }
    .sk-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      transform: scaleX(0); transform-origin: left; transition: transform .3s var(--ease);
    }
    .sk-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 36px var(--glow); }
    .sk-card:hover::after { transform: scaleX(1); }
    .sk-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .sk-ico { width: 40px; height: 40px; border-radius: 8px; background: var(--surface2); display: grid; place-items: center; font-size: 1.2rem; }
    .sk-card h3 { font-weight: 700; color: var(--heading); font-size: .95rem; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .pill { padding: 4px 11px; border-radius: 999px; font-size: .75rem; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); transition: .2s; }
    .sk-card:hover .pill { border-color: rgba(232,149,74,.3); color: var(--text); }

    /* EXPERIENCE */
    .exp-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: clamp(28px,5vw,44px); max-width: 860px; transition: .25s var(--ease);
    }
    .exp-card:hover { border-color: var(--accent); box-shadow: 0 12px 48px var(--glow); }
    .exp-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .exp-company { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--heading); line-height: 1.1; }
    .exp-role { color: var(--accent); font-weight: 600; font-size: .95rem; margin-top: 4px; }
    .exp-period { padding: 5px 14px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border); font-size: .78rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .exp-divider { height: 1px; background: var(--border); margin-bottom: 24px; }
    .exp-list { display: flex; flex-direction: column; gap: 10px; }
    .exp-list li { display: flex; gap: 12px; align-items: flex-start; font-size: .95rem; color: var(--text); line-height: 1.6; }
    .exp-list li::before { content: '▸'; color: var(--accent); flex-shrink: 0; margin-top: 1px; font-size: .85rem; }

    /* CERTS */
    .cert-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 18px; }
    .cert-tile {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 26px 24px;
      display: flex; gap: 18px; align-items: center; transition: .25s var(--ease);
    }
    .cert-tile:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(212,168,67,.12); }
    .cert-icon { width: 54px; height: 54px; border-radius: 12px; background: linear-gradient(135deg, var(--surface2), var(--bg)); border: 1px solid var(--border); display: grid; place-items: center; font-size: 1.5rem; flex-shrink: 0; }
    .cert-tile h4 { font-weight: 700; color: var(--heading); font-size: .95rem; margin-bottom: 4px; }
    .cert-issuer { font-size: .82rem; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
    .cert-code { display: inline-block; padding: 2px 9px; border-radius: 5px; font-family: monospace; font-size: .72rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

    /* EDUCATION */
    .edu-tile {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px;
      display: flex; gap: 28px; align-items: flex-start; max-width: 600px; transition: .25s var(--ease); position: relative; overflow: hidden;
    }
    .edu-tile::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(232,149,74,.06) 0%, transparent 60%); pointer-events: none; }
    .edu-tile:hover { border-color: var(--accent); }
    .edu-ico { width: 60px; height: 60px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--gold)); display: grid; place-items: center; font-size: 1.6rem; flex-shrink: 0; }
    .edu-degree { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--heading); margin-bottom: 5px; }
    .edu-school { color: var(--accent); font-weight: 600; font-size: .9rem; margin-bottom: 12px; }
    .edu-desc { font-size: .9rem; color: var(--muted); line-height: 1.7; }

    /* CONTACT */
    .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    @media (max-width: 760px) { .contact-layout { grid-template-columns: 1fr; } }
    .cinfo h3 { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--heading); margin-bottom: 14px; }
    .cinfo p { color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
    .clinks { display: flex; flex-direction: column; gap: 12px; }
    .clink {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 18px;
      text-decoration: none; transition: .25s var(--ease);
    }
    .clink:hover { border-color: var(--accent); transform: translateX(4px); }
    .clink-ico { width: 40px; height: 40px; border-radius: 9px; background: var(--surface2); display: grid; place-items: center; font-size: 1.1rem; flex-shrink: 0; }
    .clink-lbl { font-size: .72rem; color: var(--muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 2px; }
    .clink-val { font-size: .88rem; font-weight: 600; color: var(--text); }
    .cbox { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; position: relative; overflow: hidden; }
    .cbox::before { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(232,149,74,.18), transparent 70%); }
    .cbox h4 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--heading); margin-bottom: 12px; }
    .cbox p { font-size: .92rem; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
    .avail-badge { display: flex; align-items: center; gap: 8px; font-size: .78rem; font-weight: 700; color: var(--accent2); margin-bottom: 20px; }
    .avail-badge .ab-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: bl 2s ease-in-out infinite; }

    footer { position: relative; z-index: 1; text-align: center; padding: 28px 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: .82rem; }
    footer b { color: var(--accent); }

    /* REVEAL */
    .r { opacity: 0; transform: translateY(28px); transition: opacity .65s var(--ease), transform .65s var(--ease); }
    .r.on { opacity: 1; transform: translateY(0); }
    .r2 { transition-delay: .12s; }
    .r3 { transition-delay: .22s; }
    .r4 { transition-delay: .32s; }
    .hr { width: 100%; max-width: 1160px; margin: 0 auto; height: 1px; background: var(--border); opacity: .6; position: relative; z-index: 1; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#hero">Rajesh<b>.</b></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#certifications">Certs</a></li>
    <li><a href="#education">Education</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <button class="theme-btn" id="themeToggle
